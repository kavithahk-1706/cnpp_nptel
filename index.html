<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CNPP — Lecture Notes</title>
  <link rel="stylesheet" href="notes.css" />
  <style>
    /* ── index-specific styles only ── */
    .index-hero {
      margin-bottom: 48px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 36px;
    }
    .hero-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .hero-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .hero-title span { color: var(--accent); }
    .hero-sub {
      font-family: 'Lora', serif;
      font-size: 15px;
      color: var(--muted);
      max-width: 520px;
      line-height: 1.7;
    }

    /* ── search ── */
    .search-wrap {
      margin-bottom: 32px;
      position: relative;
      max-width: 420px;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      pointer-events: none;
      user-select: none;
    }
    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      padding: 11px 16px 11px 36px;
      outline: none;
      transition: border-color 0.2s;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--accent); }

    /* ── status line ── */
    .status-line {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 20px;
      min-height: 18px;
    }
    .status-line .count { color: var(--accent3); }

    /* ── lecture grid ── */
    .lec-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }
    @media (max-width: 480px) {
      .lec-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    }

    /* ── lecture card ── */
    .lec-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: border-color 0.18s, background 0.18s, transform 0.15s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .lec-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.18s;
    }
    .lec-card:hover {
      border-color: var(--accent);
      background: var(--surface2);
      transform: translateY(-2px);
    }
    .lec-card:hover::before { opacity: 1; }
    .card-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.1em;
    }
    .card-label {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: #fff;
      line-height: 1;
    }
    .card-arrow {
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
      transition: color 0.18s, transform 0.18s;
    }
    .lec-card:hover .card-arrow {
      color: var(--accent3);
      transform: translateX(3px);
    }

    /* ── states ── */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 12px;
      text-align: center;
    }
    .state-icon {
      font-size: 32px;
      opacity: 0.5;
    }
    .state-msg {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: var(--muted);
    }
    .state-sub {
      font-size: 12px;
      color: var(--muted);
      opacity: 0.6;
      max-width: 300px;
      line-height: 1.6;
    }

    /* ── loading spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── fade in ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .lec-card { animation: fadeUp 0.25s ease both; }
  </style>
</head>
<body>
  <div class="container">

    <!-- hero -->
    <div class="index-hero">
      <p class="hero-meta">IIT Kharagpur · NPTEL · Prof. S. K. Ghosh &amp; Dr. S. Chakraborty</p>
      <h1 class="hero-title">Computer Networks<br>&amp; <span>Internet Protocols</span></h1>
      <p class="hero-sub">All lecture notes, auto-loaded from the repo. New files show up on their own — no manual updates needed.</p>
    </div>

    <!-- search -->
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="search" type="text" placeholder="search lectures — try '05' or '12'" autocomplete="off" />
    </div>

    <!-- status -->
    <p class="status-line" id="status">loading...</p>

    <!-- grid -->
    <div class="lec-grid" id="grid"></div>

  </div>

  <script>
    const OWNER  = 'kavitha-hk';
    const REPO   = 'cnpp_nptel';
    const API    = `https://api.github.com/repos/${OWNER}/${REPO}/contents/`;
    const RAW    = `https://${OWNER}.github.io/${REPO}/`;

    const grid   = document.getElementById('grid');
    const status = document.getElementById('status');
    const search = document.getElementById('search');

    let allLectures = []; // { num: '01', href: '...' }

    // ── fetch files from github contents api ──
    async function fetchLectures() {
      try {
        const res = await fetch(API);
        if (!res.ok) throw new Error(`GitHub API ${res.status}`);
        const files = await res.json();

        // filter for lec##.html pattern
        const lecFiles = files
          .filter(f => f.type === 'file' && /^lec\d+\.html$/i.test(f.name))
          .map(f => {
            const num = f.name.match(/\d+/)[0].padStart(2, '0');
            return { num, name: f.name, href: `${RAW}${f.name}` };
          })
          .sort((a, b) => parseInt(a.num) - parseInt(b.num));

        allLectures = lecFiles;
        renderGrid(allLectures);

      } catch (err) {
        grid.innerHTML = '';
        status.innerHTML = '';
        grid.innerHTML = `
          <div class="state-box" style="grid-column:1/-1">
            <div class="state-icon">⚠</div>
            <p class="state-msg">couldn't reach the GitHub API</p>
            <p class="state-sub">${err.message}<br>check your connection or try again in a bit</p>
          </div>`;
      }
    }

    // ── render cards ──
    function renderGrid(lectures) {
      grid.innerHTML = '';

      if (lectures.length === 0) {
        status.innerHTML = `<span>no results</span>`;
        grid.innerHTML = `
          <div class="state-box" style="grid-column:1/-1">
            <div class="state-icon">⌕</div>
            <p class="state-msg">nothing matches that</p>
            <p class="state-sub">try a different number or clear the search</p>
          </div>`;
        return;
      }

      status.innerHTML = `<span class="count">${lectures.length}</span> lecture${lectures.length !== 1 ? 's' : ''} available`;

      lectures.forEach((lec, i) => {
        const a = document.createElement('a');
        a.className = 'lec-card';
        a.href = lec.href;
        a.style.animationDelay = `${i * 30}ms`;
        a.innerHTML = `
          <span class="card-num">LEC</span>
          <span class="card-label">${lec.num}</span>
          <span class="card-arrow">→</span>
        `;
        grid.appendChild(a);
      });
    }

    // ── loading state ──
    function showLoading() {
      status.innerHTML = 'fetching from repo...';
      grid.innerHTML = `
        <div class="state-box" style="grid-column:1/-1">
          <div class="spinner"></div>
          <p class="state-msg">hitting the github api</p>
        </div>`;
    }

    // ── search ──
    search.addEventListener('input', () => {
      const q = search.value.trim().toLowerCase();
      if (!q) { renderGrid(allLectures); return; }
      const filtered = allLectures.filter(l =>
        l.num.includes(q) || `lec${l.num}`.includes(q) || l.name.toLowerCase().includes(q)
      );
      renderGrid(filtered);
    });

    // ── go ──
    showLoading();
    fetchLectures();
  </script>
</body>
</html>
